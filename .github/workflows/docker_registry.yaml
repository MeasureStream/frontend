name: Build & Push Frontend Docker Image

on:
  push:
    branches: ["main", "feature/remove-nodes"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Estrai versione da package.json
      - name: Extract version from package.json
        id: version
        run: |
          echo "VERSION=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      # Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build e push multi-arch
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: DockerfileFrontendNew
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ github.ref_name == 'main' && format('christiand9699/frontend-react:latest,christiand9699/frontend-react:main,christiand9699/frontend-react:{0}', steps.version.outputs.VERSION) || '' }}
            ${{ github.ref_name == 'feature/remove-nodes' && format('christiand9699/frontend-react:latest-nonodes,christiand9699/frontend-react:nonodes,christiand9699/frontend-react-nonodes:{0}', steps.version.outputs.VERSION) || '' }}
      # ${{ secrets.DOCKER_USERNAME }}/frontend-react:latest
      # ${{ secrets.DOCKER_USERNAME }}/frontend-react:${{ steps.version.outputs.VERSION }}

      # Build e push DEV
      - name: Build and push DEV Docker image
        if: github.ref_name == 'main'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: DockerfileFrontendDEV
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=https://dev.christiandellisanti.uk
          tags: |
            ${{ github.ref_name == 'main' && format('christiand9699/frontend-react:latest-dev,christiand9699/frontend-react:dev,christiand9699/frontend-react:{0}-dev', steps.version.outputs.VERSION) || '' }}

          #  ${{ secrets.DOCKER_USERNAME }}/frontend-react:latest-dev
          #  ${{ secrets.DOCKER_USERNAME }}/frontend-react:${{ steps.version.outputs.VERSION }}-dev
